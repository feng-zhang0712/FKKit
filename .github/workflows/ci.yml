# Builds the Swift package for iOS Simulator using Xcode (SPM).
# Does not require committing `.swiftpm/` — Xcode resolves `Package.swift` directly.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-spm:
    name: Build (iOS Simulator / SPM)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build FKKit-Package for iOS Simulator
        run: |
          set -eo pipefail
          xcodebuild \
            -scheme FKKit-Package \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData-FKKit" \
            CODE_SIGNING_ALLOWED=NO \
            build
