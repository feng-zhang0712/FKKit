# Builds and tests the Swift package for iOS Simulator using Xcode (SPM).
# Does not require committing `.swiftpm/` — Xcode resolves `Package.swift` directly.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-spm:
    name: Build & test (iOS Simulator / SPM)
    # `macos-latest` can resolve to macOS 26 images that ship only Xcode 26.x (no 16.2). Pin macOS 15 so
    # setup-xcode can select Xcode 16.2 from /Applications. See: github.com/actions/runner-images
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify podspec s.version alignment
        run: bash scripts/verify-podspec-versions.sh

      # Pin to 16.2 so CI matches Package.swift / README minimum and teammates on Xcode 16.2.
      # `latest-stable` tracks the newest Xcode on the runner and can hide 16.2-only compile issues.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      # SWIFT_STRICT_CONCURRENCY=complete matches long-term Swift 6 checking; catches issues CI would miss at minimal/targeted.
      - name: Build and test FKKit-Package (iOS Simulator)
        run: |
          set -eo pipefail
          UDID="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/pick_iphone_simulator_udid.py")"
          echo "Selected simulator UDID=${UDID}"
          xcodebuild \
            -scheme FKKit-Package \
            -destination "platform=iOS Simulator,id=${UDID}" \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData-FKKit" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=complete \
            test
