# Builds and tests the Swift package for iOS Simulator using Xcode (SPM).
# Does not require committing `.swiftpm/` — Xcode resolves `Package.swift` directly.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-spm:
    name: Build & test (iOS Simulator / SPM)
    # `macos-latest` can be macOS 26 with only Xcode 26.x. Pin macOS 15 for multi-version Xcode installs.
    # See: https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify podspec s.version alignment
        run: bash scripts/verify-podspec-versions.sh

      # Local / Package minimum can stay Xcode 16.2; on GitHub-hosted macos-15, 16.2 often exposes no
      # non-placeholder iOS Simulator in `xcodebuild -showdestinations` (installed sim runtimes skew newer).
      # 16.4 is the image default and pairs with bundled iPhone simulators for reliable `xcodebuild test`.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      # SWIFT_STRICT_CONCURRENCY=complete matches long-term Swift 6 checking; catches issues CI would miss at minimal/targeted.
      #
      # Root cause we hit repeatedly: on a fresh clone, `xcodebuild -showdestinations` often lists only the
      # `Any iOS Simulator Device` placeholder (IDE reports "Supported platforms for the buildables … is empty")
      # until package dependencies are resolved — so parsing UDIDs from `-showdestinations` is unreliable on CI.
      #
      # Fix: resolve the Swift package graph first, then target a concrete simulator that GitHub documents on
      # macos-15 (adjust name/OS if runner-images drops iOS 18.5): macos-15-arm64-Readme.md → Installed Simulators.
      - name: Build and test FKKit-Package (iOS Simulator)
        run: |
          set -eo pipefail
          DD="${RUNNER_TEMP}/DerivedData-FKKit"
          SPM="${RUNNER_TEMP}/FKKit-SPM"
          xcodebuild \
            -scheme FKKit-Package \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "${SPM}" \
            -derivedDataPath "${DD}" \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild \
            -scheme FKKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath "${DD}" \
            -clonedSourcePackagesDirPath "${SPM}" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=complete \
            test
