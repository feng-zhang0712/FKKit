# Builds and tests the Swift package for iOS Simulator using Xcode (SPM).
# Does not require committing `.swiftpm/` — Xcode resolves `Package.swift` directly.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-spm:
    name: Build & test (iOS Simulator / SPM)
    # macOS 15 image ships multiple Xcode apps (see actions/runner-images macOS Readme); pin 16.2 below.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify podspec s.version alignment
        run: bash scripts/verify-podspec-versions.sh

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Matches docs/TOOLCHAIN.md — installed as Xcode_16.2.app on GitHub-hosted macos-15-arm64 images.
          xcode-version: '16.2'

      - name: Build and test FKKit-Package (iOS Simulator)
        run: |
          set -eo pipefail
          xcodebuild -version
          xcrun simctl list runtimes | head -30 || true
          # Avoid UDID picking across mixed CoreSimulator runtimes (exit 70 / invalid destination).
          xcodebuild \
            -scheme FKKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData-FKKit" \
            CODE_SIGNING_ALLOWED=NO \
            test
