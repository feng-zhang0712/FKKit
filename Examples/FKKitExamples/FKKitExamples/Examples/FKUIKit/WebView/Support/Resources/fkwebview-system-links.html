<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System Links</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.8; }
    a { color: #007aff; display: block; margin: 8px 0; }
  </style>

<body>
  <h1>mailto &amp; tel</h1>

  <a href="tel:+15551234567">Call demo line</a>
</body>
</html>
