<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>External Links</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.6; }
    a { color: #007aff; }
  </style>
</head>
<body>
  <h1>target="_blank" links</h1>
  <p>With <code>targetBlank = .openExternally</code>, the link below should open in Safari instead of this web view.</p>
  <p><a href="https://www.apple.com" target="_blank">Apple.com (new window)</a></p>
</body>
</html>
